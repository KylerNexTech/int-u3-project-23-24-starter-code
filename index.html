<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Jersey+10&family=Mozilla+Text:wght@200..700&display=swap" rel="stylesheet">
    </head>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    
    <body>
        <!-- Add a title and edit the opening of your story. -->
        <div class="title"> Rock Paper Scissors</div>
        <div class="story-opening">
            <img src="https://www.shutterstock.com/image-vector/pixel-art-vector-hand-gestures-260nw-2380652553.jpg" alt="Rock Paper Scissors" class="Image">
            <h3 id="computerScore">Computer: 0 </h3>
            <br>
            <h3 id="youScore">You: 0</h3>
        </div>

        <!-- Change the text of the buttons to the options relevant to your story. -->
        <div class="buttons">
            <button class="option-one">Rock 🪨</button>
            <button class="option-two">Paper 📄</button>
            <button class="option-three">Scissors ✂️</button>
        </div>

 
    </body>
</html>
